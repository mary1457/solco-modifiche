spring:
  datasource:
    url: jdbc:h2:mem:supplier_platform_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

app:
  mail:
    fail-fast: false
    retry:
      max-attempts: 1
      backoff-ms: 0
  reminders:
    document-expiry:
      mail:
        enabled: false
  reviews:
    status-mail:
      enabled: false
